version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  minio:
    image: minio/minio
    ports:
      - "9095:9000"  # Kita ganti lagi port luar MinIO ke 9095 agar super aman dari bentrok
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # APPLIKASI UTAMA NEXT.JS (DENGAN PORT BARU)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:3000" # <--- PORT KITA GANTI: Sekarang akses web utama lewat http://IP_VPS:8080
    environment:
      - DATABASE_URL=postgresql://postgres.rxdxfxwllwirqmakapqw:Oktavia0617_@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
      - NEXTAUTH_URL=http://localhost:8080  # Nanti ganti localhost dengan IP VPS Anda
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_MINIO_ENDPOINT=http://localhost:9095
    depends_on:
      - redis

volumes:
  redis_data:
  minio_data:
