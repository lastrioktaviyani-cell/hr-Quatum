version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hrd_dashboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  minio:
    image: minio/minio
    ports:
      - "9090:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ====================================================
  # APPLIKASI UTAMA NEXT.JS (DASHBOARD HRD)
  # ====================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000" # Menghubungkan Port 80 VPS (Luar) langsung ke Port 3000 Next.js (Dalam)
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hrd_dashboard
      - DIRECT_URL=postgresql://postgres:postgres@postgres:5432/hrd_dashboard
      - NEXT_PUBLIC_MINIO_ENDPOINT=http://IP_VPS_ANDA:9090
      # Tambahkan variabel .env lain yang dibutuhkan aplikasi Anda di bawah ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
